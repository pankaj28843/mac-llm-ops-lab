name: mac-llm-ops-lab

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: llm_serving
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_USER: llm_serving
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_HOST_PORT:-25432}:5432"
    secrets:
      - source: postgres_password
        target: postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data

  phoenix:
    image: arizephoenix/phoenix:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PHOENIX_SQL_DATABASE_URL: postgresql://llm_serving:${POSTGRES_PASSWORD:-local-placeholder}@postgres:5432/llm_serving
    ports:
      - "${PHOENIX_HOST_PORT:-26006}:6006"
      - "${OTLP_GRPC_HOST_PORT:-24317}:4317"
      - "${PHOENIX_PROMETHEUS_HOST_PORT:-29090}:9090"

  api:
    build:
      context: .
      target: api
    image: mac-llm-ops-lab-api:local
    depends_on:
      phoenix:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://llm_serving:${POSTGRES_PASSWORD:-local-placeholder}@postgres:5432/llm_serving
      MAC_LLM_OPS_BACKEND_KIND: ${MAC_LLM_OPS_BACKEND_KIND:-fake}
      MAC_LLM_OPS_MODEL_ALLOWLIST: ${MAC_LLM_OPS_MODEL_ALLOWLIST:-}
      MAC_LLM_OPS_OPENAI_API_KEY: ${MAC_LLM_OPS_OPENAI_API_KEY:-}
      MAC_LLM_OPS_OPENAI_BASE_URL: ${MAC_LLM_OPS_OPENAI_BASE_URL:-http://host.docker.internal:28100/v1}
      MAC_LLM_OPS_OPENAI_TIMEOUT_SECONDS: ${MAC_LLM_OPS_OPENAI_TIMEOUT_SECONDS:-30}
      MAC_LLM_OPS_OTEL_ENABLED: ${MAC_LLM_OPS_OTEL_ENABLED:-true}
      MAC_LLM_OPS_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${MAC_LLM_OPS_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://phoenix:6006/v1/traces}
      MAC_LLM_OPS_PHOENIX_PROJECT_NAME: ${MAC_LLM_OPS_PHOENIX_PROJECT_NAME:-mac-llm-ops-lab-local}
    ports:
      - "${API_HOST_PORT:-28000}:8000"

  docs:
    build:
      context: .
      target: docs
    image: mac-llm-ops-lab-docs:local
    ports:
      - "${DOCS_HOST_PORT:-28080}:8000"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    depends_on:
      api:
        condition: service_started
    environment:
      ENABLE_PERSISTENT_CONFIG: "False"
      ENABLE_OLLAMA_API: "False"
      OPENAI_API_BASE_URLS: http://api:8000/v1
      OPENAI_API_KEYS: local-dev-placeholder
      WEBUI_AUTH: "False"
    ports:
      - "${OPEN_WEBUI_HOST_PORT:-23000}:8080"
    volumes:
      - open-webui-data:/app/backend/data

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

volumes:
  open-webui-data:
  postgres-data:
